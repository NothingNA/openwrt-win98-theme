name: Build OpenWrt APK

on:
  push:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release luci-theme-win98 OpenWrt APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout theme source
        uses: actions/checkout@v4
        with:
          path: theme-src

      - name: Prepare dist dir
        run: mkdir -p dist

      - name: Install gh cli
        run: sudo apt update && sudo apt install -y gh

      - name: Build APK via OpenWrt 25.12 SDK Docker
        id: build
        env:
          TARGET: x86_64 # 根据你需要的架构修改，如 aarch64_cortex-a53
        run: |
          set -euo pipefail
          # 拉取 OpenWrt 25.12 SDK 镜像
          docker pull openwrt/sdk:25.12-x86_64
          docker run --rm \
            -v $PWD/theme-src:/package/luci-theme-win98 \
            -v $PWD/dist:/dist \
            openwrt/sdk:25.12-$TARGET \
            sh -c "
              # 更新 feeds
              ./scripts/feeds update -a
              ./scripts/feeds install luci
              # 编译当前主题包
              make package/luci-theme-win98/compile V=1
              # 复制生成的 apk 到挂载目录
              find bin/packages/*/luci-theme-win98_*.apk -exec cp {} /dist/ \;
            "
          # 获取包文件名
          APK_FILE=$(ls dist/luci-theme-win98_*.apk | head -1)
          echo "APK=$APK_FILE" >> $GITHUB_ENV

      - name: Get commit list & upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # 读取本次push所有commit
          mapfile -t shas < <(python3 - <<'PY'
          import json, os
          event = json.load(open(os.environ["GITHUB_EVENT_PATH"]))
          for c in event.get("commits", []):
              sha = c.get("id")
              if sha: print(sha)
          PY
          )
          [ ${#shas[@]} -eq 0 ] && shas=("$GITHUB_SHA")

          for sha in "${shas[@]}"; do
            short_sha="${sha:0:12}"
            tag="apk-${short_sha}"
            out_file="dist/luci-theme-win98-${short_sha}.apk"
            cp "${{ env.APK }}" "$out_file"

            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" "$out_file" --clobber
            else
              gh release create "$tag" "$out_file" \
                --target "$sha" \
                --title "luci-theme-win98 OpenWrt APK ${short_sha}" \
                --notes "Auto build OpenWrt 25.12 APK commit: \`$sha\`" \
                --latest=false
            done
          done
